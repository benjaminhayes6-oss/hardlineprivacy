name: Hardline Operator Master Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 1'  # weekly run

permissions:
  contents: write
  pull-requests: write

jobs:
  operator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc nodejs npm

      # Load dynamic topics, falling back to a hard-coded list if topics.yaml is missing
      - name: Load dynamic topics
        id: load_topics
        run: |
          if [ -f topics.yaml ]; then
            # Read topics from topics.yaml into a JSON array
            TOPICS_JSON=$(python3 -c "import yaml, json; print(json.dumps(yaml.safe_load(open('topics.yaml'))['topics']))")
          else
            echo "topics.yaml not found, using default topics"
            TOPICS_JSON='["How the 2027 Delete Act will change data broker regulation", "Best opt‑out practices for families in 2027", "State privacy law updates for 2027"]'
          fi
          echo "TOPICS_JSON=${TOPICS_JSON}" >> $GITHUB_ENV
          echo "::set-output name=topics_json::$TOPICS_JSON"

      - name: Generate blog posts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TOPICS_JSON: ${{ steps.load_topics.outputs.topics_json }}
